    .calc-sub{font-size:14px;color:var(--muted)}

    .faq-q::after{content:"＋";font-size:20px;color:var(--teal);font-weight:900}

    .faq-a{padding:0 24px;font-size:15px;color:var(--muted);line-height:1.7;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
    .faq-item.open .faq-a{max-height:400px;padding:0 24px 18px}
    footer{background:var(--s1);border-top:1px solid var(--bdr);padding:32px;text-align:center;color:var(--muted);font-size:14px}
    footer a{color:var(--teal);text-decoration:none}
    @media(max-width:600px){

<script>
const T = {
  "es": {
    "title": "Ganá $300–$800/mes con GoIP en Argentina | GoIPpro",
    "desc": "Convertí tus SIMs en ingresos pasivos en Argentina. Recibí llamadas internacionales, ganá USDT cada mes. Sin llamadas salientes — la SIM nunca se bloquea.",
    "hero": "Ganá $300–$800 por Mes con tus SIMs en Argentina",
    "sub": "Solo recibís llamadas. Sin salientes. La SIM NUNCA se bloquea. Cobrás mensualmente en USDT.",
    "steps": [
      "Comprá un dispositivo GoIP (desde $40)",
      "Insertá tus SIMs argentinas (Claro/Personal/Movistar, 2–32 slots)",
      "Conectate a la plataforma GoIPpro",
      "Recibí llamadas automáticamente",
      "Cobrá mensualmente en USDT/USDC"
    ],
    "faq": [
      [
        "¿Qué es GoIPpro?",
        "Una plataforma que te paga por recibir llamadas internacionales en tus SIMs argentinas. Conectás el GoIP, metés las SIMs y ganás por minuto — pago mensual en USDT."
      ],
      [
        "¿Es legal en Argentina?",
        "Sí. Recibir llamadas internacionales entrantes es completamente legal. Sin salientes — tu SIM nunca se bloquea."
      ],
      [
        "¿Cuánto puedo ganar?",
        "Con GoIP8 (8 SIMs): $300–$800/mes. Con GoIP32 (32 SIMs): hasta $2.000/mes."
      ],
      [
        "¿Cómo cobro?",
        "Mensualmente en USDT o USDC directo a tu billetera cripto. Mínimo de pago: $10."
      ],
      [
        "¿Qué SIMs sirven?",
        "Claro, Personal, Movistar. A más SIMs, más ganás."
      ],
      [
        "¿Necesito saber de tecnología?",
        "Para nada. La configuración es simple y el soporte es en español por Telegram."
      ]
    ],
    "rtl": false,
    "cta_primary": "Unirse por Telegram",
    "cta_secondary": "Ver en goippro.com",
    "how_title": "Cómo Funciona",
    "earn_title": "Calculadora de Ingresos",
    "faq_title": "Preguntas Frecuentes",
    "slots_label": "Número de slots de SIM",
    "monthly_label": "Ingreso mensual estimado",
    "tg_label": "💬 Únete a nuestro canal de Telegram para tarifas en vivo y soporte:",
    "tg_cta_title": "💬 ¿Listo para empezar a ganar?",
    "tg_cta_sub": "Nuestro equipo habla español. Resuelve tus dudas ahora.",
    "lang_btn": "ES"
  }
};
const CALC_AVG = 52;
const LANGS = ["es"];
let currentLang = (()=>{
  const u=new URL(window.location.href).searchParams.get("lang");
  if(u&&T[u]) return u;
  const n=(navigator.language||"en").split("-")[0];
  return T[n]?n:"es";
})();
function render(){
  const t=T[currentLang];if(!t)return;
  document.documentElement.lang=currentLang;
  document.getElementById("meta-title").textContent=t.title;
  document.getElementById("meta-desc").setAttribute("content",t.desc);
  document.getElementById("hero-h1").textContent=t.hero;
  document.getElementById("hero-sub").textContent=t.sub;
  document.getElementById("btn-tg").textContent="📱 "+t.cta_primary;
  document.getElementById("btn-site").textContent="🌐 "+t.cta_secondary;
  document.getElementById("how-title").textContent=t.how_title;
  document.getElementById("calc-title").textContent=t.earn_title;
  document.getElementById("faq-title").textContent=t.faq_title;
  document.getElementById("slots-label").textContent=t.slots_label;
  document.getElementById("monthly-label").textContent=t.monthly_label;
  document.getElementById("tg-cta-title").textContent=t.tg_cta_title||"💬 Únete ahora";
  document.getElementById("tg-cta-sub").textContent=t.tg_cta_sub||"";
  // steps
  document.getElementById("steps-grid").innerHTML=t.steps.map((s,i)=>
    `<div class="step-card"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`
  ).join("");
  // faq
  const fl=document.getElementById("faq-list");
  fl.innerHTML=t.faq.map(([q,a])=>
    `<div class="faq-item"><div class="faq-q">${q}</div><div class="faq-a">${a}</div></div>`
  ).join("");
  fl.querySelectorAll(".faq-q").forEach(b=>b.addEventListener("click",()=>b.parentElement.classList.toggle("open")));
  // lang switcher
  document.getElementById("lang-switcher").innerHTML=LANGS.map(l=>
    `<button class="lang-btn ${l===currentLang?"active":""}" onclick="switchLang('${l}')">${T[l]?.lang_btn||l.toUpperCase()}</button>`
  ).join("");
  updateCalc();
}
function switchLang(l){
  currentLang=l;
  const u=new URL(window.location.href);
  u.searchParams.set("lang",l);
  window.history.replaceState({},""u.toString());
  render();
}
function updateCalc(){
  const v=parseInt(document.getElementById("calc-slider").value);
  const d={2:"GoIP2",4:"GoIP4",8:"GoIP8",16:"GoIP16",32:"GoIP32"};
  document.getElementById("slots-val").textContent=v+" SIMs ("+(d[v]||"GoIP"+v)+")";
  document.getElementById("calc-result").textContent="$"+Math.round(v*CALC_AVG*(0.85+Math.random()*0.15));
}
document.getElementById("calc-slider").addEventListener("input",updateCalc);
render();
</script>
